repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format src/ tests/
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix --exit-non-zero-on-fix src/ tests/
        language: system
        types: [python]
        pass_filenames: false
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest tests/
        language: system
        types: [python]
        pass_filenames: false
